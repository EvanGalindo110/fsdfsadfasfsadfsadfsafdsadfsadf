{% extends "inicio.html" %}

{% block titulo %}{{ datos.nombre }}{% endblock %}

{% block contenido %}

<h4 class="text-center">Datos del usuario</h4>

<ul class="list-group mb-3">
    <li class="list-group-item"><b>Nombre:</b> {{ datos.nombre }}</li>
    <li class="list-group-item"><b>Apellidos:</b> {{ datos.apellidos }}</li>
    <li class="list-group-item"><b>Correo:</b> {{ datos.correo }}</li>
</ul>

<div class="d-grid gap-2">
    <a href="/editar" class="btn btn-primary">Editar datos</a>
    <a href="/" class="btn btn-danger">Cerrar sesión</a>
</div>

{% endblock %}
